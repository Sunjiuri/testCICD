# .github/workflows/deploy.yml

name: CI/CD Pipeline

# 触发条件：当代码推送到 master 分支时触发
on:
  push:
    branches: [ "master" ]

# 设置权限，允许部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 保证只有一个部署任务在运行，避免冲突
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 任务 1: 构建和测试
  build-and-test:
    runs-on: ubuntu-latest
    #设置默认工作目录
    defaults:
      run:
        working-directory: ./cide-test-fronted

    
    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.21.1' # 建议指定版本，或者使用 'lts'

      # 3. 安装依赖
      - name: Install dependencies
        run: npm ci

    # 4. 运行测试
      - name: Run tests
        # 这里改成显式调用 test:run，确保测试运行一次后自动退出
        run: npm run test:run


      # 5. 构建项目
      - name: Build project
        run: npm run build

      # 6. 上传构建产物 (供下一个 Job 使用)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: ./build # React 默认是 build，Vue 是 dist，请根据实际情况修改

  # 任务 2: 部署
  deploy:
    # 需要依赖构建任务完成
    needs: build-and-test
    
    # 指定部署环境
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    # 指定运行器
    runs-on: ubuntu-latest
    
    steps:
      # 1. 下载构建产物
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: build-files
          path: .

      # 2. 部署到 GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          # 再次确认上传的目录，React 是 build，Vue 是 dist
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
