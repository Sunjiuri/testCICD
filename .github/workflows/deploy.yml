# .github/workflows/deploy.yml

name: CI/CD Pipeline

# 触发条件：当代码推送到 main 分支时触发
on:
  push:
    branches: [ "main" ]

# 设置权限，允许部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 保证只有一个部署任务在运行，避免冲突
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 任务 1: 构建和测试
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18' # 建议指定版本，或者使用 'lts'

      # 3. 安装依赖
      - name: Install dependencies
        run: npm ci

    # 4. 运行测试
      - name: Run tests
        # 这里改成显式调用 test:run，确保测试运行一次后自动退出
        run: npm run test:run


      # 5. 构建项目
      - name: Build project
        run: npm run build

      # 6. 上传构建产物 (供下一个 Job 使用)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: ./build # React 默认是 build，Vue 是 dist，请根据实际情况修改

